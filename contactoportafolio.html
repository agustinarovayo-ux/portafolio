<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto | Agus Artes Gráficas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="page-contacto">
    <header class="top-bar">
        <div class="logo">
          <img src="logoags.png" alt="Agus Artes Gráficas logo">
        </div>
      
        <nav class="main-nav">
          <a href="index.html">INICIO</a>
          <a href="proyectos.html">PROYECTOS</a>
          <a href="sobremi.html">SOBRE MÍ</a>
          <a href="contactoportafolio.html">CONTACTO</a>
        </nav>
      </header>

    <main class="contacto" id="contacto">
        <div class="contact-stage">
            <h1 class="contact-title">¿Trabajamos juntos?</h1>

            <section class="window window--photo" aria-label="Imagen">
                <div class="window-body">
                    <img src="ventanacontacto1.png" alt="Imagen de contacto">
                </div>
            </section>

            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" 
        onload="if(submitted) { showCustomModal(); }"></iframe>

<div id="successModal" class="custom-modal">
  <div class="window window--modal">
    <div class="window-body">
      <p>¡Recibido! Gracias por escribirme, hablamos pronto. — Agus</p>
      <button onclick="closeModal()">Cerrar</button>
    </div>
  </div>
</div>

<script>
  var submitted = false;
  function showCustomModal() {
    document.getElementById('successModal').style.display = 'flex';
    document.querySelector('.mail-form').reset();
  }
  function closeModal() {
    document.getElementById('successModal').style.display = 'none';
    submitted = false;
  }
</script>
            
            <section class="window window--mail" aria-label="Formulario de contacto">
              <div class="window-body">
                
                <form class="mail-form" 
                      action="https://formspree.io/f/mjgavrbq" 
                      method="post" 
                      target="hidden_iframe" 
                      onsubmit="submitted=true;">
                  
                  <div class="mail-row">
                    <label for="nombre">Nombre:</label>
                    <input id="nombre" name="nombre" type="text" autocomplete="name" required>
                  </div>
            
                  <div class="mail-row">
                    <label for="email">Email:</label>
                    <input id="email" name="email" type="email" autocomplete="email" required>
                  </div>
            
                  <div class="mail-row">
                    <label for="asunto">Asunto:</label>
                    <input id="asunto" name="asunto" type="text">
                  </div>
            
                  <div class="mail-row mail-row--message">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" required></textarea>
                  </div>
            
                  <div class="mail-actions">
                    <button type="submit">Enviar mensaje</button>
                  </div>
                  
                </form>

                    <div class="mail-socials" aria-label="Redes sociales">
                        <a class="mail-socials__icon"
                           href="https://www.instagram.com/agus.artesgraficas"
                           target="_blank" rel="noopener noreferrer"
                           aria-label="Instagram">
                            <img src="instagram.png" alt="Instagram">
                        </a>
                        <a class="mail-socials__icon"
                           href="https://www.linkedin.com/in/agustina-rovayo/"
                           target="_blank" rel="noopener noreferrer"
                           aria-label="LinkedIn">
                            <img src="linkedin.png" alt="LinkedIn">
                        </a>
                        <a class="mail-socials__icon"
                        href="https://wa.me/593989953180"
                        target="_blank" rel="noopener noreferrer"
                        aria-label="Whatsapp">
                         <img src="whatsapp.png" alt="LinkedIn">
                        </a>
                    </div>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
