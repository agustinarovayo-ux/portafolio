<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Inicio | Agus Artes Gráficas</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body class="page-inicio">
        <header class="top-bar">
            <div class="logo">
              <img src="logoags.png" alt="Agus Artes Gráficas logo">
            </div>
          
            <nav class="main-nav">
              <a href="index.html">INICIO</a>
              <a href="proyectos.html">PROYECTOS</a>
              <a href="sobremi.html">SOBRE MÍ</a>
              <a href="contactoportafolio.html">CONTACTO</a>
            </nav>
          </header>

          <main class="inicio" aria-label="Inicio">
            <section class="hero" aria-label="Portada">
              <div class="hero-bg" aria-hidden="true"></div>

              <div class="hero-content">
                <div class="hero-collage" aria-label="Collage de portada">
                  <img
                    class="hero-img hero-img--postcard"
                    src="postcard.png"
                    alt="Postcard con lettering de Agus Rovayo, diseño gráfico y mixed media"
                  >
                  <img
                    class="hero-img hero-img--mirror"
                    src="mirrorpicture.png"
                    alt="Fotografía de Agus tomada frente a un espejo"
                  >
                  <img
                    class="hero-img hero-img--papertab"
                    src="papertab.png"
                    alt="Pestaña de papel rosa con el nombre Agus Rovayo"
                  >
                </div>
              </div>
            </section>

            <section class="section" aria-label="Proyectos destacados">
              <div class="section-inner">
                <h2 class="section-title" id="proyectos">mis <span class="section-title__accent">Proyectos</span></h2>

                <div class="project-grid">
                  <a class="project-card" href="proyectos.html" aria-label="Diseño">
                    <div class="project-thumb project-thumb--diseno" aria-hidden="true"></div>
                    <div class="project-label">Diseño</div>
                  </a>

                  <a class="project-card" href="proyectos.html" aria-label="Ilustración">
                    <div class="project-thumb project-thumb--ilustracion" aria-hidden="true"></div>
                    <div class="project-label">Ilustración</div>
                  </a>

                  <a class="project-card" href="proyectos.html" aria-label="Fotografía">
                    <div class="project-thumb project-thumb--foto" aria-hidden="true"></div>
                    <div class="project-label">Fotografía</div>
                  </a>

                  <a class="project-card" href="proyectos.html" aria-label="Animación">
                    <div class="project-thumb project-thumb--animacion" aria-hidden="true"></div>
                    <div class="project-label">Animación</div>
                  </a>
                </div>
              </div>
            </section>

            <section class="section section--connect" aria-label="Conectemos">
              <div class="section-inner connect">
                <div class="connect-card">
                  <h2 class="connect-title">Conectemos</h2>
                  <p class="connect-text">
                    ¿Tienes un proyecto en mente? Escríbeme y armamos algo lindo.
                  </p>

                  <div class="connect-actions">
                    <a class="btn btn--primary" href="contactoportafolio.html">Escríbeme</a>
                    <a class="btn btn--ghost" href="#" aria-disabled="true">Descarga mi CV</a>
                  </div>

                  <div class="connect-socials" aria-label="Redes sociales">
                    <a class="connect-socials__icon"
                       href="https://www.instagram.com/agus.artesgraficas"
                       target="_blank" rel="noopener noreferrer"
                       aria-label="Instagram">
                        <img src="instagram.png" alt="Instagram">
                    </a>
                    <a class="connect-socials__icon"
                       href="https://www.linkedin.com/in/agustina-rovayo/"
                       target="_blank" rel="noopener noreferrer"
                       aria-label="LinkedIn">
                        <img src="linkedin.png" alt="LinkedIn">
                    </a>
                    <a class="connect-socials__icon"
                       href="https://wa.me/593989953180"
                       target="_blank" rel="noopener noreferrer"
                       aria-label="Whatsapp">
                        <img src="whatsapp.png" alt="Whatsapp">
                    </a>
                  </div>
                </div>
              </div>
            </section>
          </main>

          <footer class="site-footer" aria-label="Pie de página">
            <p>Agus Rovayo · Portafolio · 2026</p>
          </footer>
    </body>
</html>
